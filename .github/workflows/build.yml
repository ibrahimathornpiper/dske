name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Check out ChOma submodule
      run: |
        cd darksword-kexploit-fun/XPF/external
        if [ -d "ChOma" ]; then
          cd ChOma && git checkout main && git pull || git clone https://github.com/safemore/ChOma.git .
        fi

    - name: Install ldid
      run: |
        brew install ldid
        which ldid

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build iOS Project
      env:
        PROJECT_DIR: darksword-kexploit-fun.xcodeproj
        SCHEME: darksword-kexploit-fun
        CONFIGURATION: Release
      run: |
        xcodebuild -project "$PROJECT_DIR" \
          -scheme "$SCHEME" \
          -configuration "$CONFIGURATION" \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=YES \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          CODE_SIGN_ENTITLEMENTS="" \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          build 2>&1 | tee /tmp/xcodebuild.log | tail -50

    - name: Find built app
      run: |
        echo "=== Searching for .app ==="
        find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null || true
        echo "=== Searching for kfun.app specifically ==="
        find ~/Library/Developer/Xcode/DerivedData -name "kfun.app" -type d 2>/dev/null || true
        echo "=== All .app bundles ==="
        find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null | head -20 || true

    - name: Create IPA with ldid signing
      run: |
        set -e

        mkdir -p /tmp/ipa_output/Payload

        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "kfun.app" -type d 2>/dev/null | head -1)
        if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
          echo "ERROR: Could not find kfun.app"
          echo "Last 100 lines of xcodebuild log:"
          tail -100 /tmp/xcodebuild.log
          exit 1
        fi

        echo "[+] Found app at: $APP_PATH"

        # Remove any existing code signature directory
        rm -rf "$APP_PATH/_CodeSignature"

        # Copy app to Payload
        cp -R "$APP_PATH" /tmp/ipa_output/Payload/

        APP_BUNDLE="/tmp/ipa_output/Payload/kfun.app"
        ENTITLEMENTS="$GITHUB_WORKSPACE/darksword-kexploit-fun/darksword-kexploit-fun/entitlements.plist"

        echo "[+] Entitlements path: $ENTITLEMENTS"
        ls -la "$ENTITLEMENTS" || echo "WARNING: Entitlements file not found!"

        # Sign main executable
        echo "[+] Signing main executable: $APP_BUNDLE/kfun"
        file "$APP_BUNDLE/kfun"
        if [ -f "$ENTITLEMENTS" ]; then
          ldid -S"$ENTITLEMENTS" "$APP_BUNDLE/kfun"
        else
          ldid -S "$APP_BUNDLE/kfun"
        fi
        echo "[+] Main executable signed"

        # Sign the XPF dylib if it exists
        if [ -f "$APP_BUNDLE/Frameworks/libxpf.dylib" ]; then
          echo "[+] Signing libxpf.dylib"
          if [ -f "$ENTITLEMENTS" ]; then
            ldid -S"$ENTITLEMENTS" "$APP_BUNDLE/Frameworks/libxpf.dylib"
          else
            ldid -S "$APP_BUNDLE/Frameworks/libxpf.dylib"
          fi
        fi

        # Sign any other dylibs
        find "$APP_BUNDLE" -name "*.dylib" -type f | while read -r lib; do
          echo "[+] Signing dylib: $lib"
          ldid -S "$lib" 2>/dev/null || true
        done

        # Sign any frameworks
        find "$APP_BUNDLE" -name "*.framework" -type d | while read -r fw; do
          fw_bin=$(basename "$fw" .framework)
          fw_path="$fw/$fw_bin"
          if [ -f "$fw_path" ]; then
            echo "[+] Signing framework binary: $fw_path"
            ldid -S "$fw_path" 2>/dev/null || true
          fi
        done

        # Remove any _CodeSignature that might have been created
        rm -rf "$APP_BUNDLE/_CodeSignature"

        # Verify signing
        echo "[+] Verifying signature on main executable..."
        codesign -dvv "$APP_BUNDLE/kfun" 2>&1 || true

        # Create IPA
        cd /tmp/ipa_output
        zip -r kfun.ipa Payload

        echo ""
        echo "========================================="
        echo "  IPA created successfully!"
        echo "========================================="
        ls -lh /tmp/ipa_output/kfun.ipa

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: DarkSword-IPA
        path: /tmp/ipa_output/*.ipa
        retention-days: 30
