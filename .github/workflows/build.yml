name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Check out ChOma submodule
      run: |
        cd darksword-kexploit-fun/XPF/external
        if [ -d "ChOma" ]; then
          cd ChOma && git checkout main && git pull || git clone https://github.com/safemore/ChOma.git .
        fi

    - name: Install ldid
      run: |
        brew install ldid

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build iOS Project (no signing for CI)
      env:
        PROJECT_DIR: darksword-kexploit-fun.xcodeproj
        SCHEME: darksword-kexploit-fun
        CONFIGURATION: Release
      run: |
        xcodebuild -project "$PROJECT_DIR" \
          -scheme "$SCHEME" \
          -configuration "$CONFIGURATION" \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_STYLE=Manual \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          build 2>&1 | tail -50

    - name: Create IPA with ldid signing
      run: |
        mkdir -p /tmp/ipa_output/Payload
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "kfun.app" -type d 2>/dev/null | head -1)
        if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
          echo "Found app at: $APP_PATH"

          # Remove any existing code signature
          rm -rf "$APP_PATH/_CodeSignature"

          # Copy app to Payload
          cp -R "$APP_PATH" /tmp/ipa_output/Payload/

          APP_BUNDLE="/tmp/ipa_output/Payload/kfun.app"
          ENTITLEMENTS="$GITHUB_WORKSPACE/darksword-kexploit-fun/darksword-kexploit-fun/entitlements.plist"

          # Sign main executable with entitlements
          echo "[+] Signing main executable..."
          ldid -S"$ENTITLEMENTS" "$APP_BUNDLE/kfun" || {
            echo "[-] ldid signing with entitlements failed, trying without..."
            ldid -S "$APP_BUNDLE/kfun" || echo "[-] ldid signing failed"
          }

          # Sign all other Mach-O binaries in the app bundle
          echo "[+] Signing additional binaries..."
          find "$APP_BUNDLE" -type f \( -name "*.dylib" -o -name "*.framework" \) | while read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              echo "  Signing: $file"
              ldid -S"$ENTITLEMENTS" "$file" 2>/dev/null || ldid -S "$file" 2>/dev/null || true
            fi
          done

          # Sign any standalone executables
          find "$APP_BUNDLE" -type f -perm +111 | while read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              echo "  Signing executable: $file"
              ldid -S"$ENTITLEMENTS" "$file" 2>/dev/null || ldid -S "$file" 2>/dev/null || true
            fi
          done

          # Remove _CodeSignature if ldid created one
          rm -rf "$APP_BUNDLE/_CodeSignature"

          # Create IPA
          cd /tmp/ipa_output
          zip -r kfun.ipa Payload

          echo "IPA created successfully"
          ls -la /tmp/ipa_output/
        else
          echo "ERROR: Could not find kfun.app"
          echo "Searching DerivedData..."
          find ~/Library/Developer/Xcode/DerivedData -type d -name "*.app" 2>/dev/null
          exit 1
        fi

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: DarkSword-IPA
        path: /tmp/ipa_output/*.ipa
        retention-days: 30
