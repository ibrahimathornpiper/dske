name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Check out ChOma submodule
      run: |
        cd darksword-kexploit-fun/XPF/external
        if [ -d "ChOma" ]; then
          cd ChOma && git checkout main && git pull || git clone https://github.com/safemore/ChOma.git .
        fi

    - name: Install ldid
      run: |
        brew install ldid

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build iOS Project (no signing for CI)
      env:
        PROJECT_DIR: darksword-kexploit-fun.xcodeproj
        SCHEME: darksword-kexploit-fun
        CONFIGURATION: Release
      run: |
        xcodebuild -project "$PROJECT_DIR" \
          -scheme "$SCHEME" \
          -configuration "$CONFIGURATION" \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build 2>&1 | tail -30

    - name: Create IPA with ldid signing
      run: |
        mkdir -p /tmp/ipa_output/Payload
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "kfun.app" -type d 2>/dev/null | head -1)
        if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
          echo "Found app at: $APP_PATH"

          cp -R "$APP_PATH" /tmp/ipa_output/Payload/

          ldid -S /tmp/ipa_output/Payload/kfun.app/kfun || echo "ldid signing done"

          cd /tmp/ipa_output
          zip -r kfun.ipa Payload

          echo "IPA created successfully"
          ls -la /tmp/ipa_output/
        else
          echo "ERROR: Could not find kfun.app"
          exit 1
        fi

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: DarkSword-IPA
        path: /tmp/ipa_output/*.ipa
        retention-days: 30
